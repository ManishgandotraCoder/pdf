<table
  style="
    width: 100%;
    height: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    background: #ffffff;
  "
>
  <tbody>
    @for (row of matrix(); track $index; let i = $index) {
      <tr>
        @for (cell of row; track $index; let j = $index) {
          <td
            appTableCell
            [row]="i"
            [col]="j"
            [html]="cell"
            [readOnly]="readOnly()"
            (htmlInput)="onCell(i, j, $event)"
            (cellFocus)="cellFocus.emit()"
          ></td>
        }
      </tr>
    }
  </tbody>
</table>
