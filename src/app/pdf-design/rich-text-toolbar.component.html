<div
  data-rich-toolbar
  style="
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    padding: 8px 8px 10px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
  "
>
  <select
    title="Font"
    [disabled]="disabled()"
    (mousedown)="onFontMouseDown($event)"
    (change)="onFontChange($event)"
    style="font-size: 11px; padding: 4px 6px; border-radius: 5px; border: 1px solid #cbd5e1; max-width: 140px"
  >
    <option value="" disabled selected>Font…</option>
    @for (f of fonts(); track f) {
      <option [value]="f">{{ f }}</option>
    }
  </select>
  <select
    title="Font size"
    [disabled]="disabled()"
    (mousedown)="onFontMouseDown($event)"
    (change)="onSizeChange($event)"
    style="font-size: 11px; padding: 4px 6px; border-radius: 5px; border: 1px solid #cbd5e1; width: 72px"
  >
    <option value="" disabled selected>Size</option>
        @for (sz of sizes; track sz) {
          <option [value]="'' + sz">{{ sz }}px</option>
        }
  </select>
  <button
    type="button"
    title="Bold"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('bold')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    B
  </button>
  <button
    type="button"
    title="Italic"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('italic')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      font-style: italic;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    I
  </button>
  <button
    type="button"
    title="Underline"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('underline')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      text-decoration: underline;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    U
  </button>
  <label style="font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 4px">
    Text
    <input
      type="color"
      [disabled]="disabled()"
      (mousedown)="$event.preventDefault()"
      (change)="onForeColor($event)"
      style="width: 26px; height: 22px; padding: 0; border: 1px solid #cbd5e1; border-radius: 4px"
      [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    />
  </label>
  <label style="font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 4px">
    BG
    <input
      type="color"
      title="Background"
      [disabled]="disabled()"
      (mousedown)="$event.preventDefault()"
      (change)="onBackColor($event)"
      style="width: 26px; height: 22px; padding: 0; border: 1px solid #cbd5e1; border-radius: 4px"
      [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    />
  </label>
  <label style="font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 4px">
    Hi
    <input
      type="color"
      title="Highlight"
      [disabled]="disabled()"
      (mousedown)="$event.preventDefault()"
      (change)="onHilite($event)"
      style="width: 26px; height: 22px; padding: 0; border: 1px solid #cbd5e1; border-radius: 4px"
      [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    />
  </label>
  <button
    type="button"
    title="Insert link"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); link()"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    Link
  </button>
  <button
    type="button"
    title="Align left"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyLeft')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    ◧
  </button>
  <button
    type="button"
    title="Align center"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyCenter')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    ≡
  </button>
  <button
    type="button"
    title="Align right"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyRight')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    ◨
  </button>
  <button
    type="button"
    title="Justify"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyFull')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    ⊞
  </button>
  <button
    type="button"
    title="Outdent"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('outdent')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    ⊢
  </button>
  <button
    type="button"
    title="Indent"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('indent')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    ⊣
  </button>
  <button
    type="button"
    title="Bullet list"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('insertUnorderedList')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    •
  </button>
  <button
    type="button"
    title="Numbered list"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('insertOrderedList')"
    style="
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      border-radius: 5px;
      background: #fff;
      color: #334155;
      min-width: 26px;
    "
    [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    [style.opacity]="disabled() ? 0.45 : 1"
  >
    1.
  </button>
</div>
