<div data-rich-toolbar class="rich-text-toolbar-wrap">
  <select
    title="Font"
    [disabled]="disabled()"
    (change)="onFontChange($event)"
    style="max-width: 140px"
  >
    <option value="" disabled selected>Font…</option>
    @for (f of fonts(); track f) {
      <option [value]="f">{{ f }}</option>
    }
  </select>
  <select
    title="Font size"
    [disabled]="disabled()"
    (change)="onSizeChange($event)"
    style="width: 72px"
  >
    <option value="" disabled selected>Size</option>
    @for (sz of sizes; track sz) {
      <option [value]="'' + sz">{{ sz }}px</option>
    }
  </select>
  <button
    type="button"
    class="rt-btn rt-btn--bi"
    title="Bold"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('bold')"
  >
    B
  </button>
  <button
    type="button"
    class="rt-btn rt-btn--italic"
    title="Italic"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('italic')"
  >
    I
  </button>
  <button
    type="button"
    class="rt-btn rt-btn--underline"
    title="Underline"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('underline')"
  >
    U
  </button>
  <label style="font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 4px">
    Text
    <input
      type="color"
      [disabled]="disabled()"
      (mousedown)="$event.preventDefault()"
      (change)="onForeColor($event)"
      style="width: 28px; height: 24px; padding: 0; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer"
      [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    />
  </label>
  <label style="font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 4px">
    BG
    <input
      type="color"
      title="Background"
      [disabled]="disabled()"
      (mousedown)="$event.preventDefault()"
      (change)="onBackColor($event)"
      style="width: 28px; height: 24px; padding: 0; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer"
      [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    />
  </label>
  <label style="font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 4px">
    Hi
    <input
      type="color"
      title="Highlight"
      [disabled]="disabled()"
      (mousedown)="$event.preventDefault()"
      (change)="onHilite($event)"
      style="width: 28px; height: 24px; padding: 0; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer"
      [style.cursor]="disabled() ? 'not-allowed' : 'pointer'"
    />
  </label>
  <button
    type="button"
    class="rt-btn"
    title="Insert link"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); link()"
  >
    Link
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Align left"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyLeft')"
  >
    ◧
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Align center"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyCenter')"
  >
    ≡
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Align right"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyRight')"
  >
    ◨
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Justify"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('justifyFull')"
  >
    ⊞
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Outdent"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('outdent')"
  >
    ⊢
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Indent"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('indent')"
  >
    ⊣
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Bullet list"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('insertUnorderedList')"
  >
    •
  </button>
  <button
    type="button"
    class="rt-btn"
    title="Numbered list"
    [disabled]="disabled()"
    (mousedown)="$event.preventDefault()"
    (click)="$event.preventDefault(); exec('insertOrderedList')"
  >
    1.
  </button>
</div>
