<div class="landing">
  <div class="landing__brand">
    <svg width="34" height="34" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <rect width="32" height="32" rx="9" fill="url(#uz-grad)" />
      <path d="M8 8h10a6 6 0 0 1 0 12H8V8z" stroke="#0f766e" stroke-width="2" fill="none" />
      <line x1="8" y1="14" x2="18" y2="14" stroke="#0f766e" stroke-width="1.5" />
      <defs>
        <linearGradient id="uz-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
          <stop stop-color="#5eead4" stop-opacity="0.35" />
          <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.12" />
        </linearGradient>
      </defs>
    </svg>
    <span class="landing__title">PDF Editor</span>
  </div>
  <p class="landing__blurb">
    Drop or browse a PDF to open it in the editor. Edit text, images, add tables and more.
  </p>
  <div
    class="landing__drop"
    [class.landing__drop--active]="drag"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave()"
    (drop)="onDrop($event)"
    (click)="fileInput.click()"
  >
    <svg
      width="40"
      height="40"
      viewBox="0 0 24 24"
      fill="none"
      [attr.stroke]="drag ? '#0d9488' : '#64748b'"
      stroke-width="1.5"
      style="display: block; margin: 0 auto 1rem"
      aria-hidden="true"
    >
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="17 8 12 3 7 8" />
      <line x1="12" y1="3" x2="12" y2="15" />
    </svg>
    <p [style.color]="drag ? '#0d9488' : '#475569'" style="font-size: 0.9rem; margin-bottom: 0.35rem; font-weight: 500">
      Drop PDF or <span style="color: #0d9488; font-weight: 700;">browse</span>
    </p>
    <p style="color: #94a3b8; font-size: 0.75rem">Proposals, reports, brochures — any PDF up to 25 MB</p>
  </div>
  <input #fileInput type="file" accept=".pdf" style="display: none" (change)="onFileChange($event)" />
  <a
    href="/"
    style="
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: #64748b; text-decoration: none;
      padding: 8px 16px; border-radius: 8px;
      border: 1px solid rgba(15,23,42,0.1); background: rgba(255,255,255,0.8);
      transition: color 0.12s, border-color 0.12s;
    "
  >
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to PDF list
  </a>
</div>
