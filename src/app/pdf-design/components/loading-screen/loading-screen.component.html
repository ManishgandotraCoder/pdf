<div class="loading-screen">
  <div class="loading-screen__label">Extracting design data</div>
  <div class="loading-screen__track">
    <div class="loading-screen__fill" [style.width.%]="progress()"></div>
  </div>
  <div class="loading-screen__pct">{{ progress() }}%</div>
  <div class="loading-screen__meta">Page {{ done() }} of {{ total() }}</div>
</div>
