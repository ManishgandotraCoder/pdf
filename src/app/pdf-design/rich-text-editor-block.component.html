<app-rich-text-toolbar [disabled]="disabled()" [fontChoices]="fontChoices()" />
<div
  #editable
  [attr.contenteditable]="!disabled() ? true : null"
  (input)="onInput($event)"
  [style.width]="'100%'"
  [style.minHeight.px]="minHeight()"
  style="
    background: #ffffff;
    border: 1px solid #2aacb8;
    border-radius: 6px;
    color: #0f172a;
    font-size: 12px;
    padding: 8px 10px;
    line-height: 1.5;
    outline: none;
  "
></div>
