<div class="modal-backdrop" (click)="onBackdropClick($event)">
  <div class="modal-panel" (click)="$event.stopPropagation()">
    <div class="modal-panel__title">Crop image</div>
    <p class="modal-panel__text">
      Adjust the crop rectangle (pixels from top-left of the current image).
    </p>
    @if (natural().w > 0) {
      <div class="modal-panel__preview">
        <img alt="" [src]="sourceUrl()" style="width: 100%; display: block; opacity: 0.9" />
      </div>
    }
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px">
      @for (k of cropKeys; track k) {
        <label style="font-size: 10px; color: #64748b">
          {{ k.toUpperCase() }} (px)
          <input
            type="number"
            class="input-field"
            [value]="cropVal(k)"
            min="0"
            (input)="setCropFromInput(k, $event)"
            style="width: 100%; margin-top: 4px"
          />
        </label>
      }
    </div>
    @if (natural().w > 0) {
      <div style="font-size: 10px; color: #94a3b8; margin-bottom: 12px">
        Image {{ natural().w }}×{{ natural().h }}px · crop covers {{ pct(crop().w, natural().w) }}% ×
        {{ pct(crop().h, natural().h) }}%
      </div>
    }
    <div class="modal-panel__actions">
      <button type="button" class="btn-ghost" (click)="cancel.emit()">Cancel</button>
      <button
        type="button"
        class="btn-primary"
        [disabled]="natural().w === 0 || crop().w < 1 || crop().h < 1"
        (click)="onApply()"
        [style.opacity]="natural().w === 0 || crop().w < 1 || crop().h < 1 ? 0.5 : 1"
      >
        Apply crop
      </button>
    </div>
  </div>
</div>
