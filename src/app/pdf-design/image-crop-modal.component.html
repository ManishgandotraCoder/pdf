<div
  style="
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  "
  (click)="onBackdropClick($event)"
>
  <div
    style="
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    "
    (click)="$event.stopPropagation()"
  >
    <div style="font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 10px">Crop image</div>
    <p style="font-size: 11px; color: #64748b; margin-bottom: 12px">
      Adjust the crop rectangle (pixels from top-left of the current image).
    </p>
    @if (natural().w > 0) {
      <div
        style="
          margin-bottom: 12px;
          border-radius: 8px;
          overflow: hidden;
          border: 1px solid #e8ecf0;
          background: #f4f6fa;
        "
      >
        <img alt="" [src]="sourceUrl()" style="width: 100%; display: block; opacity: 0.85" />
      </div>
    }
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px">
      @for (k of cropKeys; track k) {
        <label style="font-size: 10px; color: #64748b">
          {{ k.toUpperCase() }} (px)
          <input
            type="number"
            [value]="cropVal(k)"
            min="0"
            (input)="setCropFromInput(k, $event)"
            style="
              width: 100%;
              margin-top: 4px;
              padding: 6px 8px;
              border: 1px solid #d1d9e0;
              border-radius: 6px;
              font-size: 12px;
            "
          />
        </label>
      }
    </div>
    @if (natural().w > 0) {
      <div style="font-size: 10px; color: #94a3b8; margin-bottom: 12px">
        Image {{ natural().w }}×{{ natural().h }}px · crop covers {{ pct(crop().w, natural().w) }}% ×
        {{ pct(crop().h, natural().h) }}%
      </div>
    }
    <div style="display: flex; gap: 8px; justify-content: flex-end">
      <button
        type="button"
        (click)="cancel.emit()"
        style="
          padding: 8px 14px;
          border-radius: 6px;
          border: 1px solid #d1d9e0;
          background: #fff;
          color: #475569;
          font-size: 12px;
          cursor: pointer;
        "
      >
        Cancel
      </button>
      <button
        type="button"
        [disabled]="natural().w === 0 || crop().w < 1 || crop().h < 1"
        (click)="onApply()"
        style="
          padding: 8px 14px;
          border-radius: 6px;
          border: none;
          background: #2aacb8;
          color: #fff;
          font-size: 12px;
          cursor: pointer;
          font-weight: 600;
        "
        [style.opacity]="natural().w === 0 || crop().w < 1 || crop().h < 1 ? 0.5 : 1"
      >
        Apply crop
      </button>
    </div>
  </div>
</div>
